version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ttt-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localdbpassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.22.0
    container_name: ttt-nakama
    entrypoint:
      - /bin/sh
      - -ecx
      - |
        /nakama/nakama migrate up --database.address postgres:localdbpassword@postgres:5432/nakama
        exec /nakama/nakama \
          --name nakama1 \
          --database.address postgres:localdbpassword@postgres:5432/nakama \
          --logger.level INFO \
          --session.token_expiry_sec 7200 \
          --runtime.path /nakama/data/modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "7349:7349" # gRPC
      - "7350:7350" # HTTP + WS
      - "7351:7351" # Console
    volumes:
      - ./nakama/modules:/nakama/data/modules

volumes:
  postgres_data:
